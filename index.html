<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoNote</title>
    <script type="module" src="/src/main.js"></script>
    <!-- <link rel="stylesheet" href="/src/style.css"> -->
    <!-- importing it in js is enought in vite  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="bg-[#8b98f910]">
      <nav
        class="flex justify-between max-h-20 px-4 py-2 fixed w-full backdrop-blur-sm"
      >
        <div class="container-logo">
          <img class="h-full" src="/logo.png" alt="Logo of the DoNote App" />
        </div>
        <ul class="flex items-center justify-between">
          <li>
            <button class="px-4 py-2 flex flex-row gap-2">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                />
              </svg>
              Profile
            </button>
          </li>
          <li>
            <button class="px-4 py-2 flex flex-row gap-2">
              <!-- <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
                />
              </svg> -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
                />
              </svg>
            </button>
          </li>
        </ul>
      </nav>
    </header>
    <main id="app" class="flex justify-center min-h-dvh">
      <section
        id="todo-app"
        class="bg-[#8b98f923] min-w-xs w-2xl max-w-3xl mt-24"
      >
        <form class="mb-4">
          <input
            type="text"
            placeholder="Create a new todo..."
            class="bg-[#8b98f923] w-full px-8 py-4 text-2xl rounded-lg"
          />
        </form>

        <div id="todo-container" class="">
          <ul class="todo-list mx-4 flex flex-col gap-2 overflow-y-auto">
            <li class="todo px-4 py-6 text-[#e7eaff] mb-0.5 bg-[#8b98f923]">
              Task 1
            </li>
            <li class="todo px-4 py-6 text-[#e7eaff] mb-0.5 bg-[#8b98f923]">
              Task 2
            </li>
            <li class="todo px-4 py-6 text-[#e7eaff] mb-0.5 bg-[#8b98f923]">
              Task 3
            </li>
            <li class="todo px-4 py-6 text-[#e7eaff] mb-0.5 bg-[#8b98f923]">
              Task 4
            </li>
            <li class="todo px-4 py-6 text-[#e7eaff] mb-0.5 bg-[#8b98f923]">
              Task 4
            </li>
            <li class="todo px-4 py-6 text-[#e7eaff] mb-0.5 bg-[#8b98f923]">
              Task 4
            </li>
            <li class="todo px-4 py-6 text-[#e7eaff] mb-0.5 bg-[#8b98f923]">
              Task 4
            </li>
            <li class="todo px-4 py-6 text-[#e7eaff] mb-0.5 bg-[#8b98f923]">
              Task 4
            </li>
          </ul>
        </div>
      </section>
    </main>
    <footer>
      <p class="text-[#e8eaf7a0] text-xs text-center">
        &copy; Abulfazl Amiri, 2026
      </p>
    </footer>
  </body>
</html>
