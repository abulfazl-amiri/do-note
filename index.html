<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoNote</title>
    <script type="module" src="/src/main.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="max-h-dvh flex flex-col text-sm relative">
    <header class="h-20">
      <nav
        class="h-full w-full box-border grid grid-cols-3 items-center px-2 gap-4 shadow-lg bg-[#222]"
      >
        <div class="w-24 h-full">
          <img
            class="h-full object-contain"
            src="/logo-amber.png"
            alt="Logo of the DoNote App"
          />
        </div>
        <div
          class="flex flex-row justify-center items-center gap-1 text-amber-500 hover:contrast-75"
        >
          <img class="size-5" src="/icon.png" alt="Won donutes" />
          <span>+3</span>
        </div>
        <ul class="m-0 flex items-center justify-end p-0 list-none">
          <li class="px-3 py-2">
            <button class="flex flex-row gap-2 text-white hover:contrast-75">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="size-5 lucide lucide-circle-user-round-icon lucide-circle-user-round"
              >
                <path d="M17.925 20.056a6 6 0 0 0-11.851.001" />
                <circle cx="12" cy="11" r="4" />
                <circle cx="12" cy="12" r="10" />
              </svg>
              <span class="hidden"> Profile </span>
            </button>
          </li>
          <li class="px-3 py-2">
            <button class="flex flex-row gap-2 text-white hover:contrast-75">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="size-5 lucide lucide-sun-icon lucide-sun"
              >
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2" />
                <path d="M12 20v2" />
                <path d="m4.93 4.93 1.41 1.41" />
                <path d="m17.66 17.66 1.41 1.41" />
                <path d="M2 12h2" />
                <path d="M20 12h2" />
                <path d="m6.34 17.66-1.41 1.41" />
                <path d="m19.07 4.93-1.41 1.41" />
              </svg>
            </button>
          </li>
        </ul>
      </nav>
    </header>
    <main id="app" class="flex justify-center items-center flex-1">
      <section id="todo-app" class="w-2xl grid gap-4 rounded-sm px-4 pt-10">
        <form
          class="todo-form flex flex-row justify-between items-center relative grow-0 bg-[#222] text-white px-4 rounded-sm border-transparent border focus-within:border focus-within:border-current"
        >
          <input
            type="text"
            placeholder="Create a new todo..."
            class="todo-input py-4 rounded-sm w-full border-0 outline-0"
          />
          <button class="btn-add bg-amber-600 rounded-sm p-1">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="w-4 h-4 lucide lucide-plus-icon lucide-plus"
            >
              <path d="M5 12h14" />
              <path d="M12 5v14" />
            </svg>
          </button>
        </form>

        <div id="todo-container" class="flex-1 min-h-0">
          <ul class="todo-list flex flex-col gap-2 h-[60vh] overflow-y-auto">
            <li
              class="todo grid grid-cols-[fit-content(24px)_minmax(0,1fr)_fit-content(24px)] items-center gap-3 px-4 py-5 max-w-full text-white mb-0.5 bg-[#333] hover:contrast-[.90] rounded-sm"
            >
              <button class="hover:brightness-75">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="w-4 h-4 lucide lucide-circle-icon lucide-circle"
                >
                  <circle cx="12" cy="12" r="10" />
                </svg>
              </button>
              <span class="overflow-x-clip"> Task 1 </span>
              <button class="ml-auto hover:brightness-75 p-1">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="w-4 h-4 lucide lucide-x-icon lucide-x"
                >
                  <path d="M18 6 6 18" />
                  <path d="m6 6 12 12" />
                </svg>
              </button>
            </li>
            <li
              class="todo grid grid-cols-[fit-content(24px)_minmax(0,1fr)_fit-content(24px)] items-center gap-3 px-4 py-5 text-white mb-0.5 bg-[#333] hover:contrast-[.90] rounded-sm"
            >
              <button class="hover:brightness-75">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="w-4 h-4 lucide lucide-circle-icon lucide-circle"
                >
                  <circle cx="12" cy="12" r="10" />
                </svg>
              </button>
              <span
                class="overflow-hidden whitespace-nowrap text-ellipsis"
                title=""
              >
                A very long task with a lot of words, it will get ellipsised
              </span>
              <button class="ml-auto hover:brightness-75 p-1">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="w-4 h-4 lucide lucide-x-icon lucide-x"
                >
                  <path d="M18 6 6 18" />
                  <path d="m6 6 12 12" />
                </svg>
              </button>
            </li>
          </ul>
        </div>
        <div
          class="sort flex flex-row justify-between items-center mt-auto text-gray-500 px-1 text-xs"
        >
          <div class="mr-auto">
            <span
              class="w-6 h-6 px-2 inline-flex items-center justify-center rounded-full bg-[#222] text-amber-500"
              title="Total todos"
            >
              5
            </span>
            <span class="">Tasks</span>
          </div>
          <button class="">Clear All</button>
        </div>
        <div
          class="flex justify-center gap-8 bg-[#222] text-amber-500 rounded-sm px-6 py-3"
        >
          <button class="selected brightness-100 hover:brightness-75">
            All
          </button>
          <button class="brightness-75 hover:brightness-75">Doing</button>
          <button class="brightness-75 hover:brightness-75">Done</button>
        </div>
      </section>
    </main>
    <footer class="flex justify-center items-center py-4">
      <p class="text-gray-500 text-xs">&copy; Abulfazl Amiri, 2026</p>
    </footer>
    <div class="overlay absolute h-full w-full backdrop-blur-xs"></div>

    <div
      class="preview-container absolute size-full flex justify-center items-center"
    >
      <div
        class="profile-preview absolute flex flex-col w-[80vw] h-[50vh] bg-[#222] px-10 py-8 pt-14"
      >
        <div class="profile flex flex-row items-center gap-2 py-3">
          <!-- <img src="" alt="User's profile" /> -->
          <svgj
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="size-5 lucide lucide-circle-user-round-icon lucide-circle-user-round"
          >
            <path d="M17.925 20.056a6 6 0 0 0-11.851.001" />
            <circle cx="12" cy="11" r="4" />
            <circle cx="12" cy="12" r="10" />
          </svgj>
          <span> Full Name </span>
        </div>
        <div class="profile flex flex-row items-center gap-2 py-3">
          <!-- <img src="" alt="User's profile" /> -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="size-5 lucide lucide-trash-icon lucide-trash"
          >
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
            <path d="M3 6h18" />
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
          <span> Clear All Todoes & History </span>
        </div>
        <div class="seprator border-b border-amber-900 mt-2"></div>
        <div class="flex flex-row items-center gap-2 py-3">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="size-5 lucide lucide-user-round-plus-icon lucide-user-round-plus"
          >
            <path d="M2 21a8 8 0 0 1 13.292-6" />
            <circle cx="10" cy="8" r="5" />
            <path d="M19 16v6" />
            <path d="M22 19h-6" />
          </svg>
          <span> Create new account </span>
        </div>
        <div class="flex flex-row items-center gap-2 py-3">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="size-5 lucide lucide-log-out-icon lucide-log-out"
          >
            <path d="m16 17 5-5-5-5" />
            <path d="M21 12H9" />
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          </svg>
          <span> Logout </span>
        </div>

        <button class="absolute right-2 top-2 p-4">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="w-4 h-4 lucide lucide-x-icon lucide-x"
          >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>
    </div>
  </body>
</html>
