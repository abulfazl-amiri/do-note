<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoNote</title>
    <script type="module" src="/src/main.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="max-h-dvh flex flex-col text-sm relative">
    <!-- Section Login-->
    <section
      class="section-login size-full flex-center absolute z-10 bg-[#111]"
    >
      <div
        class="card card--sign-in flex-center max-w-md flex-col px-6 py-12 mx-4 bg-[#222] gap-4"
      >
        <div class="container flex-center flex-col text-center">
          <div
            class="logo-container flex-center px-28 shrink-0 min-w-xs max-w-sm"
          >
            <img
              class="h-full object-contain"
              src="/logo-amber.png"
              alt="Logo of the DoNote App"
            />
          </div>
          <span class="text-gray-300">Note it. Do it. Win a donut.</span>
          <span class="text-sm text-gray-400"
            >The only simplist way to get things done!</span
          >
        </div>
        <form action="" class="form-login grid w-full gap-1">
          <div class="flex flex-col">
            <label for="username" class="px-2 py-2 text-gray-300"
              >Username*</label
            >
            <input
              type="text"
              id="username"
              placeholder="username"
              required
              class="input-username px-2 py-2 border border-gray-500 rounded-sm"
            />
          </div>
          <div class="flex flex-col">
            <label for="pin" class="px-2 py-2 text-gray-300">Pin*</label>
            <input
              type="password"
              inputmode="numeric"
              pattern="[0-9]*"
              placeholder="xxxx"
              required
              id="pin"
              class="input-pin px-2 py-2 border border-gray-500 rounded-sm"
            />
          </div>
          <div class="flex flex-col mt-6">
            <button class="btn btn-login w-full py-2 rounded-sm bg-amber-600">
              Login
            </button>
          </div>
        </form>
      </div>
    </section>
    <!-- header -->
    <header class="h-20">
      <nav
        class="h-full w-full box-border grid grid-cols-3 items-center px-2 gap-4 shadow-lg bg-[#222]"
      >
        <div class="w-24 h-full">
          <img
            class="h-full object-contain"
            src="/logo-amber.png"
            alt="Logo of the DoNote App"
          />
        </div>
        <div
          class="flex flex-row justify-center items-center gap-1 text-amber-500 hover:contrast-75"
        >
          <img class="size-5" src="/icon.png" alt="Won donutes" />
          <span class="counter--todo-done">0</span>
        </div>
        <ul
          class="m-0 flex items-center justify-end p-0 list-none text-gray-400"
        >
          <li class="px-3 py-2">
            <button
              class="btn btn--show-profile flex flex-row gap-2 hover:contrast-75"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="size-5 lucide lucide-circle-user-round-icon lucide-circle-user-round"
              >
                <path d="M17.925 20.056a6 6 0 0 0-11.851.001" />
                <circle cx="12" cy="11" r="4" />
                <circle cx="12" cy="12" r="10" />
              </svg>
              <span class="hidden"> Profile </span>
            </button>
          </li>
          <li class="px-3 py-2">
            <button class="btn flex flex-row gap-2 hover:contrast-75">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="size-5 lucide lucide-sun-icon lucide-sun"
              >
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2" />
                <path d="M12 20v2" />
                <path d="m4.93 4.93 1.41 1.41" />
                <path d="m17.66 17.66 1.41 1.41" />
                <path d="M2 12h2" />
                <path d="M20 12h2" />
                <path d="m6.34 17.66-1.41 1.41" />
                <path d="m19.07 4.93-1.41 1.41" />
              </svg>
            </button>
          </li>
        </ul>
      </nav>
    </header>
    <!-- App -->
    <main id="app" class="flex-center flex-1">
      <section id="todo-app" class="w-2xl grid gap-4 rounded-sm px-4 pt-10">
        <form
          class="todo-form flex flex-row justify-between items-center relative grow-0 bg-[#222] text-white px-4 rounded-sm border-transparent border focus-within:border focus-within:border-amber-600"
        >
          <input
            type="text"
            placeholder="Create a new todo..."
            class="todo-input py-4 pr-2 rounded-sm w-full border-0 outline-0"
          />
          <button class="btn-add bg-amber-600 rounded-sm p-1">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="w-4 h-4 lucide lucide-plus-icon lucide-plus"
            >
              <path d="M5 12h14" />
              <path d="M12 5v14" />
            </svg>
          </button>
        </form>

        <div id="todo-container" class="flex-1 min-h-0">
          <ul
            class="todo-list flex flex-col gap-2 h-[60vh] overflow-y-auto scrollbar-special"
          >

                <svg

                  <path d="M18 6 6 18" />

                </svg>
              </button>
            </li> -->
            <span class="text-center text-gray-500">No Todoes here.</span>
          </ul>
        </div>
        <div
          class="sort flex flex-row justify-between items-center mt-auto text-gray-500 px-1 text-xs"
        >
          <div class="mr-auto">
            <span
              class="todo-counter w-6 h-6 px-2 inline-flex items-center justify-center rounded-full bg-[#222] text-amber-500"
              title="Total todos"
            >
              0
            </span>
            <span class="">Tasks</span>
          </div>
          <button class="btn btn--clear-done mr-auto hover:text-amber-600">
            Clear Done
          </button>
          <button class="btn btn--clear-all hover:text-red-600">
            Clear All
          </button>
        </div>
        <div
          class="container--filter-btns flex justify-center gap-8 bg-[#222] rounded-sm px-6 py-3"
        >
          <button
            class="btn filter-all selected brightness-75 hover:brightness-75"
          >
            All
          </button>
          <button class="btn filter-doing brightness-75 hover:brightness-75">
            Doing
          </button>
          <button class="btn filter-done brightness-75 hover:brightness-75">
            Done
          </button>
        </div>
      </section>
    </main>
    <footer class="flex-center py-4">
      <p class="text-gray-500 text-xs">&copy; Abulfazl Amiri, 2026</p>
    </footer>

    <div class="preview-container overlay z-10 absolute hidden">
      <div
        class="profile-preview z-20 absolute flex flex-col w-[80vw] max-w-md h-[50vh] bg-[#222] px-10 py-8 pt-14 rounded-sm"
      >
        <div class="profile flex flex-row items-center gap-2 py-3">
          <!-- <img src="" alt="User's profile" /> -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="size-5 lucide lucide-circle-user-round-icon lucide-circle-user-round"
          >
            <path d="M17.925 20.056a6 6 0 0 0-11.851.001" />
            <circle cx="12" cy="11" r="4" />
            <circle cx="12" cy="12" r="10" />
          </svg>
          <span> Full Name </span>
        </div>
        <div class="profile flex flex-row items-center gap-2 py-3">
          <!-- <img src="" alt="User's profile" /> -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="size-5 lucide lucide-trash-icon lucide-trash"
          >
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
            <path d="M3 6h18" />
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
          <span> Clear All Todoes & History </span>
        </div>
        <div class="seprator border-b border-amber-900 mt-2"></div>
        <div class="flex flex-row items-center gap-2 py-3">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="size-5 lucide lucide-user-round-plus-icon lucide-user-round-plus"
          >
            <path d="M2 21a8 8 0 0 1 13.292-6" />
            <circle cx="10" cy="8" r="5" />
            <path d="M19 16v6" />
            <path d="M22 19h-6" />
          </svg>
          <span> Create new account </span>
        </div>
        <div class="flex flex-row items-center gap-2 py-3">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="size-5 lucide lucide-log-out-icon lucide-log-out"
          >
            <path d="m16 17 5-5-5-5" />
            <path d="M21 12H9" />
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          </svg>
          <span> Logout </span>
        </div>

        <button class="absolute right-2 top-2 p-4">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="btn btn--close-preview size-4 lucide lucide-x-icon lucide-x"
          >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />

        </button>

  </body>
</html>
