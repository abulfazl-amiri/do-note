<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoNote</title>
    <script type="module" src="/src/main.js"></script>
    <!-- <link rel="stylesheet" href="/src/style.css"> -->
    <!-- importing it in js is enought in vite  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen flex flex-col">
    <header class="grow-0">
      <nav
        class="flex justify-between max-h-20 px-4 py-2 gap-4 w-full shadow-lg bg-[#222]"
      >
        <div class="">
          <img
            class="h-full"
            src="/logo-white.png"
            alt="Logo of the DoNote App"
          />
        </div>
        <div
          class="flex flex-row justify-center items-center gap-1 text-green-400 hover:contrast-75"
        >
          <img class="size-8" src="/icon.png" alt="Won donutes" />
          <span>+3</span>
        </div>
        <ul class="flex items-center justify-between">
          <li>
            <button
              class="px-4 py-2 flex flex-row gap-2 text-white hover:contrast-75"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                />
              </svg>
              Profile
            </button>
          </li>
          <li>
            <button
              class="px-4 py-2 flex flex-row gap-2 text-white hover:contrast-75"
            >
              <!-- <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
                />
              </svg> -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
                />
              </svg>
            </button>
          </li>
        </ul>
      </nav>
    </header>
    <main id="app" class="flex justify-center flex-1 min-h-0 border-2">
      <section
        id="todo-app"
        class="min-w-xs w-2xl max-w-3xl flex flex-col flex-1 min-h-0 mt-24 rounded-sm px-4 pb-6"
      >
        <form class="todo-form mb-6 text-white px-4">
          <input
            type="text"
            placeholder="Create a new todo..."
            class="todo-input bg-[#222] px-5 py-4 text-xl rounded-sm w-full"
          />
        </form>

        <div
          id="todo-container"
          class="flex-1 min-h-0 overflow-y-auto mb-4 pr-1"
        >
          <ul class="todo-list mx-4 flex flex-col gap-2">
            <li
              class="todo px-4 py-6 text-white mb-0.5 bg-[#333] hover:contrast-[.90] rounded-sm"
            >
              Task 1
            </li>
            <li
              class="todo px-4 py-6 text-white mb-0.5 bg-[#333] hover:contrast-[.90] rounded-sm"
            >
              Task 2
            </li>
            <li
              class="todo px-4 py-6 text-white mb-0.5 bg-[#333] hover:contrast-[.90] rounded-sm"
            >
              Task 3
            </li>
            <li
              class="todo px-4 py-6 text-white mb-0.5 bg-[#333] hover:contrast-[.90] rounded-sm"
            >
              Task 4
            </li>
            <li
              class="todo px-4 py-6 text-white mb-0.5 bg-[#333] hover:contrast-[.90] rounded-sm"
            >
              Task 5
            </li>
          </ul>
        </div>
        <div
          class="sort flex flex-row justify-end items-center text-gray-500 px-4 gap-4"
        >
          <span
            class="min-w-8 h-8 px-2 inline-flex items-center justify-center rounded-full bg-[#222] text-gray-300 text-sm"
            title="Total todos"
          >
            5
          </span>
          <button
            class="text-green-700 hover:brightness-125 mr-auto"
            title="Clear done and win a donut 🍩!"
          >
            Clear done & win the Donuts
          </button>
          <button class="selected text-gray-300 hover:brightness-125">
            All
          </button>
          <button class="hover:brightness-125">Doing</button>
          <button class="hover:brightness-125">Done</button>
        </div>
      </section>
    </main>
    <footer class="shrink-0">
      <p class="text-[#e8eaf7a0] text-xs flex py-4 justify-center mt-auto">
        &copy; Abulfazl Amiri, 2026
      </p>
    </footer>
  </body>
</html>
